<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apolo - The Ultimate Product</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: #007BFF;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        .product {
            background: #fff;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .product img {
            max-width: 100%;
            border-radius: 5px;
        }
        .price {
            font-size: 24px;
            color: #28a745;
            margin: 20px 0;
        }
        .buy-now {
            display: inline-block;
            padding: 10px 20px;
            background: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .buy-now:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Apolo Product Page</h1>
    </header>
    <div class="container">
        <div class="product">
            <h2>Apolo</h2>
            <img src="apolo-product.jpg" alt="Apolo Product">
            <p>The Apolo is the ultimate solution for your needs. Experience unparalleled quality and performance.</p>
            <div class="price">$99.99</div>
            <a href="#" class="buy-now">Buy Now</a>
        </div>
    </div>
</body>
</html>
